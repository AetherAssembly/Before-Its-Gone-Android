# GitHub labels for Before It's Gone — Android
# Managed by .github/workflows/label-sync.yml
# Edit here, commit to main, and the workflow will sync to GitHub automatically.

# ── Type ─────────────────────────────────────────────────────────────────────
- name: bug
  color: 'FAEAEA'
  description: Something isn't working

- name: feature
  color: 'EAF3DE'
  description: New feature or enhancement

- name: chore
  color: 'F1EFE8'
  description: Maintenance, refactors, or non-user-facing work

- name: documentation
  color: 'E6F1FB'
  description: Improvements or additions to documentation

- name: security
  color: 'FAEEDA'
  description: Security vulnerability or audit finding

# ── Status ────────────────────────────────────────────────────────────────────
- name: in-progress
  color: 'E6F1FB'
  description: Actively being worked on

- name: needs-review
  color: 'EEEDFE'
  description: Ready for review

- name: needs-info
  color: 'FAEEDA'
  description: Waiting for more information from the reporter

- name: stale
  color: 'F1EFE8'
  description: No recent activity; will be closed soon

- name: blocked
  color: 'FAEAEA'
  description: Blocked by something else

- name: do-not-merge
  color: 'FAEAEA'
  description: This PR must not be merged yet

- name: pinned
  color: 'EEEDFE'
  description: Exempt from stale closing

# ── Area ──────────────────────────────────────────────────────────────────────
- name: 'area: domain'
  color: 'EAF3DE'
  description: 'domain module: models, use cases, repository interfaces'

- name: 'area: data'
  color: 'FAEEDA'
  description: 'data module: Room, DataStore, repositories, sync, WorkManager'

- name: 'area: ui'
  color: 'EEEDFE'
  description: 'app module: Compose screens, ViewModels, navigation'

- name: 'area: scanner'
  color: 'E6F1FB'
  description: Barcode scanning, CameraX pipeline, or flavor-specific analyzer

- name: 'area: notifications'
  color: 'EEEDFE'
  description: WorkManager expiry check, notification channels, or notification UI

- name: 'area: sync'
  color: 'EAF3DE'
  description: Supabase cloud sync or conflict resolution

- name: 'area: import-export'
  color: 'FAEEDA'
  description: JSON or CSV import/export

- name: 'area: packaging'
  color: 'F1EFE8'
  description: Build config, flavors, signing, or CI release pipeline

# ── Platform ──────────────────────────────────────────────────────────────────
- name: 'flavor: play'
  color: 'EAF3DE'
  description: Play Store flavor (ML Kit barcode scanning)

- name: 'flavor: foss'
  color: 'E6F1FB'
  description: FOSS flavor (ZXing barcode scanning, no Google dependencies)

# ── PR labels ─────────────────────────────────────────────────────────────────
- name: dependencies
  color: 'E6F1FB'
  description: Dependency updates (Dependabot)

- name: skip-changelog
  color: 'F1EFE8'
  description: Exempt from the changelog check

# ── Size (applied automatically by pr-size.yml) ───────────────────────────────
- name: 'size: XS'
  color: 'EAF3DE'
  description: 'Diff < 10 lines'

- name: 'size: S'
  color: 'EAF3DE'
  description: 'Diff 10–49 lines'

- name: 'size: M'
  color: 'FAEEDA'
  description: 'Diff 50–249 lines'

- name: 'size: L'
  color: 'FAEEDA'
  description: 'Diff 250–499 lines'

- name: 'size: XL'
  color: 'FAEAEA'
  description: 'Diff 500+ lines; consider splitting'
