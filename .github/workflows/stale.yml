name: Stale issues & PRs

on:
  schedule:
    # Runs every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stale:
    name: Mark and close stale threads
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          # ── Timing ───────────────────────────────────────────────────────
          days-before-stale: 30
          days-before-close: 7

          # ── Issues ───────────────────────────────────────────────────────
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been open for 30 days with no recent activity.
            It will be closed in 7 days unless there's a new comment or the
            `stale` label is removed.

            If this is still relevant, please leave a comment so we know!
          close-issue-message: >
            Closing due to inactivity. If this is still relevant, feel free
            to re-open and add more context.

          # Issues with these labels will never be marked stale
          exempt-issue-labels: 'pinned,security,bug,in-progress'

          # ── Pull Requests ─────────────────────────────────────────────────
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has been open for 30 days with no recent activity.
            It will be closed in 7 days unless there's a new review, push,
            or comment, or the `stale` label is removed.
          close-pr-message: >
            Closing due to inactivity. The branch is still there; feel free
            to re-open when ready.

          # PRs with these labels will never be marked stale
          exempt-pr-labels: 'pinned,security,in-progress,do-not-merge'

          # Don't mark draft PRs as stale
          exempt-draft-pr: true
